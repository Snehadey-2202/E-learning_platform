services:
  # ---------------------------------------------
  # 1. PostgreSQL Database
  # ---------------------------------------------
  - type: pgo
    name: elearning-db
    databaseName: elearning
    user: elearning_user
    plan: free

  # ---------------------------------------------
  # 2. Django Backend API
  # ---------------------------------------------
  - type: web
    name: elearning-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/ # Or any other valid endpoint
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: elearning-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: elearning-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: elearning-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: elearning-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: elearning-db
          property: password
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*" # You can restrict this to your frontend URL later

  # ---------------------------------------------
  # 3. React Frontend
  # ---------------------------------------------
  - type: web
    name: elearning-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: elearning-backend
          property: host

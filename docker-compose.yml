version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=elearning
      - POSTGRES_USER=elearning_user
      - POSTGRES_PASSWORD=elearning_pass
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    environment:
      - DB_NAME=elearning
      - DB_USER=elearning_user
      - DB_PASSWORD=elearning_pass
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_SECRET_KEY=prod-secret-key-xyz-789
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=*
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_volume:/app/media:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  media_volume:
  static_volume:
